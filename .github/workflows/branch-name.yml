name: Branch name

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

jobs:
  validate-branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest

    steps:
      - name: Check branch prefix
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH_NAME" =~ ^(feature|fix|docs|chore|refactor|test)/[a-z0-9._-]+$ ]]; then
            echo "Branch name is valid: $BRANCH_NAME"
            exit 0
          fi

          echo "Invalid branch name: $BRANCH_NAME"
          echo "Use one of these formats:"
          echo "- feature/short-description"
          echo "- fix/short-description"
          echo "- docs/short-description"
          echo "- chore/short-description"
          echo "- refactor/short-description"
          echo "- test/short-description"
          exit 1
